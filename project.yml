name: Focus

options:
  bundleIdPrefix: com.personal.focus
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: NO

configs:
  Debug: debug
  Release: release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    exactVersion: 2.52.0

targets:
  Focus:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Supabase
        product: Auth
      - package: Supabase
        product: PostgREST
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: Focus
        CFBundleDisplayName: Focus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        SupabaseURL: "$(SUPABASE_URL)"
        SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.focus.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets:
        - FocusTests
      gatherCoverageData: false

  FocusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FocusTests
    dependencies:
      - target: Focus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.focus.tests
        GENERATE_INFOPLIST_FILE: YES
